name: Build & Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Validate module.json version matches tag
        run: |
          TAG_VERSION="${{ steps.get_version.outputs.VERSION }}"
          MODULE_VERSION=$(jq -r .version module.json)

          if [ "$TAG_VERSION" != "v$MODULE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match module.json version ($MODULE_VERSION)"
            exit 1
          fi

      - name: Create release ZIP
        run: |
          zip -r cantrip-counter.zip . \
            -x "*.git*" \
            -x "*.github*" \
            -x "node_modules/*" \
            -x "*.zip"

      - name: Create GitHub Release and upload ZIP
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: ${{ steps.get_version.outputs.VERSION }}
          files: cantrip-counter.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}