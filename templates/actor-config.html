<form style="width:100%; padding:16px; box-sizing:border-box;">

  <!-- LOW THRESHOLD -->
  <div class="form-group" style="display:flex; flex-direction:column; align-items:center; margin-bottom:16px;">
    <label style="margin-bottom:6px;">Low Threshold (%)</label>

    <div style="width:80%; padding:8px; border-radius:6px;">
      <range-picker
        name="thresholdLow"
        value="{{thresholdLow}}"
        min="0"
        max="100"
        step="1"
        style="width:100%;">
      </range-picker>
    </div>
  </div>


  <!-- MEDIUM THRESHOLD -->
  <div class="form-group" style="display:flex; flex-direction:column; align-items:center; margin-bottom:18px;">
    <label style="margin-bottom:6px;">Medium Threshold (%)</label>

    <div style="width:80%; padding:8px; border-radius:6px;">
      <range-picker
        name="thresholdMedium"
        value="{{thresholdMedium}}"
        min="0"
        max="100"
        step="1"
        style="width:100%;">
      </range-picker>
    </div>
  </div>

  <hr style="margin:18px 0;">

  <!-- LOW COLOR -->
  <div class="form-group" style="display:flex; justify-content:center; margin-bottom:14px;">
    <div style="width:80%; padding:8px; border-radius:6px;">
      <label style="display:block; margin-bottom:6px;">Low Color</label>
      <input type="color"
             name="glowLow"
             value="{{glowLow}}"
             style="width:100%; height:40px; cursor:pointer;">
    </div>
  </div>


  <!-- MEDIUM COLOR -->
  <div class="form-group" style="display:flex; justify-content:center; margin-bottom:14px;">
    <div style="width:80%; padding:8px; border-radius:6px;">
      <label style="display:block; margin-bottom:6px;">Medium Color</label>
      <input type="color"
             name="glowMedium"
             value="{{glowMedium}}"
             style="width:100%; height:40px; cursor:pointer;">
    </div>
  </div>


  <!-- HIGH COLOR -->
  <div class="form-group" style="display:flex; justify-content:center; margin-bottom:18px;">
    <div style="width:80%; padding:8px; border-radius:6px;">
      <label style="display:block; margin-bottom:6px;">High Color</label>
      <input type="color"
             name="glowHigh"
             value="{{glowHigh}}"
             style="width:100%; height:40px; cursor:pointer;">
    </div>
  </div>


  <!-- BUTTONS -->
  <div style="display:flex; justify-content:center; gap:12px; margin-top:10px;">

    <button type="submit"
            data-action="submit"
            style="flex:0 0 40%;">
      Save
    </button>

    <button type="button"
            data-action="resetDefaults"
            style="flex:0 0 40%;">
      Reset to Defaults
    </button>

  </div>

</form>
